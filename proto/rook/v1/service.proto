syntax = "proto3";

package rook.v1;

service RookService {
  rpc SendMessage (SendMessageRequest) returns (SendMessageResponse);
  rpc StreamChat (stream StreamChatRequest) returns (stream StreamChatResponse);
  rpc ListExtensions (ListExtensionsRequest) returns (ListExtensionsResponse);
  rpc InstallExtension (InstallExtensionRequest) returns (InstallExtensionResponse);
  rpc RemoveExtension (RemoveExtensionRequest) returns (RemoveExtensionResponse);
  rpc GetConfig (GetConfigRequest) returns (GetConfigResponse);
  rpc UpdateConfig (UpdateConfigRequest) returns (UpdateConfigResponse);
  rpc ListClients (ListClientsRequest) returns (ListClientsResponse);
  rpc DelegateTask (DelegateTaskRequest) returns (DelegateTaskResponse);
  rpc PushSyncState (PushSyncStateRequest) returns (PushSyncStateResponse);
  rpc PullSyncState (PullSyncStateRequest) returns (PullSyncStateResponse);
  rpc CreateTenant (CreateTenantRequest) returns (CreateTenantResponse);
  rpc ListTenants (ListTenantsRequest) returns (ListTenantsResponse);
  rpc DeleteTenant (DeleteTenantRequest) returns (DeleteTenantResponse);
}

message LlmMessage {
  string role = 1;
  string content = 2;
  string tool_call_id = 3;
  string tool_name = 4;
  string tool_calls = 5;
}

message SendMessageRequest {
  string chat_id = 1;
  string content = 2;
  string role = 3;
}

message SendMessageResponse {
  string message_id = 1;
}

message StreamChatRequest {
  string chat_id = 1;

  oneof action {
    UserMessage user_message = 2;
    ToolResults tool_results = 3;
    CancelRequest cancel = 4;
  }

  message UserMessage {
    string content = 1;
    string model = 2;
    repeated LlmMessage history = 3;
  }

  message ToolResults {
    repeated ToolResult results = 1;
  }

  message CancelRequest {
    string reason = 1;
  }
}

message ToolResult {
  string call_id = 1;
  string content = 2;
  bool is_error = 3;
}

message StreamChatResponse {
  string chat_id = 1;

  oneof payload {
    StreamChunk chunk = 2;
    ToolCall tool_call = 3;
    Completion complete = 4;
    Error error = 5;
  }

  message StreamChunk {
    string content = 1;
    bool is_final = 2;
    bool is_reasoning = 3;
  }

  message ToolCall {
    string id = 1;
    string name = 2;
    string arguments = 3;
  }

  message Completion {
    int32 tokens_used = 1;
  }

  message Error {
    string code = 1;
    string message = 2;
  }
}

message Extension {
  string id = 1;
  string name = 2;
  string version = 3;
  string description = 4;
  bool enabled = 5;
}

message ListExtensionsRequest {}
message ListExtensionsResponse {
  repeated Extension extensions = 1;
}

message InstallExtensionRequest {
  string id = 1;
}
message InstallExtensionResponse {}

message RemoveExtensionRequest {
  string id = 1;
}
message RemoveExtensionResponse {}

message ConfigEntry {
  string key = 1;
  string value = 2;
}

message GetConfigRequest {}
message GetConfigResponse {
  repeated ConfigEntry entries = 1;
}

message UpdateConfigRequest {
  repeated ConfigEntry entries = 1;
}
message UpdateConfigResponse {}

message Client {
  string id = 1;
  string name = 2;
  string host = 3;
  bool online = 4;
}

message ListClientsRequest {}
message ListClientsResponse {
  repeated Client clients = 1;
}

message DelegateTaskRequest {
  string client_id = 1;
  bytes payload = 2;
}
message DelegateTaskResponse {
  string task_id = 1;
}

message SyncState {
  bytes crdt_data = 1;
  string node_id = 2;
  int64 hlc_wall_time_ms = 3;
  int32 hlc_logical_counter = 4;
}

message PushSyncStateRequest {
  SyncState state = 1;
}
message PushSyncStateResponse {}

message PullSyncStateRequest {
  string node_id = 1;
}
message PullSyncStateResponse {
  SyncState state = 1;
}

message CreateTenantRequest {
  string tenant_id = 1;
}
message CreateTenantResponse {
  string token = 1;
}

message ListTenantsRequest {}
message ListTenantsResponse {
  repeated string tenant_ids = 1;
}

message DeleteTenantRequest {
  string tenant_id = 1;
}
message DeleteTenantResponse {}
