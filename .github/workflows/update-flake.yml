name: Update Flake Lock

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: determinate-systems/nix-installer-action@v22

      - name: Update Flake Lock
        uses: determinate-systems/update-flake-lock-action@v24
        with:
          pr-title: "chore(nix): update flake.lock"
          pr-labels: |
            dependencies
            nix
